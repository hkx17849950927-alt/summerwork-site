<body>
  <div class="leaf leaf-one" aria-hidden="true"></div>
  <div class="leaf leaf-two" aria-hidden="true"></div>

  <main class="shell">
    <header class="hero">
      <p class="eyebrow">清风书房 · 有声阅读</p>
      <h1>为谁辛苦为谁忙</h1>
      <p class="author">刘志雄</p>
      <p class="intro">让文字慢慢流进耳朵。你的音色和听读位置，只保存在当前设备。</p>
    </header>

    <section class="player-card" aria-labelledby="player-title">
      <div class="book-mark" aria-hidden="true">书</div>
      <div class="player-main">
        <div class="status-row">
          <div>
            <p class="label">正在听读</p>
            <h2 id="player-title">准备书籍中…</h2>
          </div>
          <span id="progressText" class="progress-text">0%</span>
        </div>

        <div class="progress-track" role="progressbar" aria-label="听读进度" aria-valuemin="0" aria-valuemax="100" aria-valuenow="0">
          <div id="progressFill" class="progress-fill"></div>
        </div>
        <input id="seekSlider" class="seek-slider" type="range" min="0" max="1000" value="0" aria-label="调整全书播放进度">
        <div id="sectionMarkers" class="section-markers" aria-label="全书章节位置"></div>
        <div class="section-jump">
          <label for="sectionSelect">目录跳转</label>
          <select id="sectionSelect" aria-label="选择章节或小节"></select>
        </div>

        <p id="excerpt" class="excerpt" aria-live="polite">正文载入后，将从上一次的位置继续。</p>
        <audio id="bookAudio" preload="metadata"></audio>

        <div class="controls">
          <button id="listenButton" class="button button-primary" type="button" disabled>
            <span id="listenIcon" class="button-icon" aria-hidden="true">▶</span>
            <span id="listenLabel">语音听读</span>
          </button>
          <button id="voiceButton" class="button button-secondary" type="button">
            <span class="button-icon" aria-hidden="true">♬</span>
          <span>我的声音</span>
          </button>
        </div>

        <div class="small-controls">
          <label for="rateSelect">语速</label>
          <select id="rateSelect">
            <option value="0.8">舒缓 0.8×</option>
            <option value="1" selected>自然 1.0×</option>
            <option value="1.2">轻快 1.2×</option>
            <option value="1.5">快速 1.5×</option>
          </select>
          <button id="restartButton" class="text-button" type="button">从头开始</button>
        </div>
      </div>
    </section>

    <section class="note-card">
      <span aria-hidden="true">🌿</span>
      <p><strong>自动续听已开启</strong><br>暂停、关闭页面或更换设备前，当前位置会自动保存。</p>
    </section>
  </main>

  <dialog id="voiceDialog" class="voice-dialog">
    <form method="dialog" class="dialog-head">
      <div>
        <p class="eyebrow">选择你的声音</p>
        <h2>音色设置</h2>
      </div>
      <button class="close-button" value="close" aria-label="关闭">×</button>
    </form>

    <div class="tabs" role="tablist" aria-label="音色类型">
      <button id="systemTab" class="tab active" role="tab" aria-selected="true">系统音色</button>
      <button id="customTab" class="tab" role="tab" aria-selected="false">录制我的声音</button>
    </div>

    <section id="systemPanel" class="tab-panel" role="tabpanel" aria-labelledby="systemTab">
      <label class="field-label" for="voiceSelect">可用音色</label>
      <select id="voiceSelect" class="voice-select"></select>
      <p class="hint">音色由当前浏览器和操作系统提供，中文音色会优先显示。</p>
      <button id="previewButton" class="button button-secondary full" type="button">试听这段声音</button>
    </section>

    <section id="customPanel" class="tab-panel" role="tabpanel" aria-labelledby="customTab" hidden>
      <div class="consent-box">
        <input id="consentCheck" type="checkbox">
        <label for="consentCheck">我确认这是我本人的声音，并同意仅用它生成我的专属听读音色。</label>
      </div>
      <div id="recorder" class="recorder">
        <div id="recordPulse" class="record-pulse" aria-hidden="true"></div>
        <p id="recordStatus"><strong>录制约 20–30 秒</strong><br>请在安静环境中自然朗读一段文字。</p>
        <p class="sample-text">“清晨的风从窗边经过，书页轻轻翻动。愿今天的声音，温柔而清晰。”</p>
        <button id="recordButton" class="button button-record" type="button" disabled>开始录制</button>
        <audio id="recordPreview" controls hidden></audio>
      </div>
      <button id="createVoiceButton" class="button button-primary full" type="button" disabled>生成我的音色</button>
      <p id="cloneNotice" class="hint">录音会先保存在此设备。生成音色需要由站点接入已获授权的语音服务。</p>
    </section>
  </dialog>

  <div id="toast" class="toast" role="status" aria-live="polite"></div>
</body>
</html>
